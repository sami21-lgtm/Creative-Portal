<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Panel | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="login-overlay" class="login-wrapper">
        <div class="login-card">
            <h2>CMS Panel Login</h2>
            <input type="text" id="userInput" placeholder="Username ">
            <input type="password" id="passInput" placeholder="Password ">
            <button class="primary-btn" onclick="handleLogin()">Sign In</button>
            <p id="err" class="error-msg">Invalid login!</p>
        </div>
    </div>

    <div id="app-wrapper" style="display: none;">
        <div class="container">
            <aside class="sidebar">
                <div class="sidebar-brand">
                    <i class="fas fa-bars"></i>
                    <span>CMS Panel</span>
                </div>
                
                <ul class="nav-menu">
                    <li class="active" onclick="navigate('dashboard', this)">
                        <i class="fas fa-th-large"></i> <span>Dashboard</span>
                    </li>
                    <li onclick="navigate('calendar', this)">
                        <i class="fas fa-calendar-alt"></i> <span>Calendar</span>
                    </li>
                    <li onclick="navigate('chat', this)">
                        <i class="fas fa-comments"></i> <span>Chat</span>
                    </li>
                    <li onclick="navigate('notifications', this)">
                        <i class="fas fa-bell"></i> <span>Notifications</span>
                    </li>
                    
                    <li class="menu-label">REPORTS & ANALYTICS</li>
                    
                    <li onclick="navigate('performance', this)">
                        <i class="fas fa-chart-line"></i> <span>Performance</span>
                    </li>
                    <li onclick="navigate('reports', this)">
                        <i class="fas fa-file-alt"></i> <span>Reports</span>
                    </li>
                    <li onclick="navigate('settings', this)">
                        <i class="fas fa-user-shield"></i> <span>Admin Settings</span>
                    </li>
                </ul>
            </aside>

            <main class="main-content">
                <header class="top-bar">
                    <div id="page-title">Dashboard Overview</div>
                    <div class="user-meta" onclick="logout()">Logout 👤</div>
                </header>

                <div class="content-body">
                    <section id="page-dashboard" class="page active">
                        <div class="grid">
                            <div class="card"><canvas id="chart1"></canvas></div>
                            <div class="card"><canvas id="chart2"></canvas></div>
                        </div>
                    </section>

                    <section id="page-calendar" class="page">
                        <div class="card">
                            <h2 id="calHeader">April 2026</h2>
                            <div class="calendar-grid" id="calGrid"></div>
                        </div>
                    </section>

                    <section id="page-chat" class="page"><h1>Chat Room</h1><p>Messaging system coming soon...</p></section>
                    <section id="page-performance" class="page"><h1>Performance Analytics</h1><canvas id="chart3"></canvas></section>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
